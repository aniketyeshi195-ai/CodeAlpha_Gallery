<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>CodeAlpha Image Gallery</h1>

<div class="filters">
<button onclick="filterImages('all')">All</button>
<button onclick="filterImages('nature')">Nature</button>
<button onclick="filterImages('animal')">Animals</button>
<button onclick="filterImages('city')">Cities</button>
</div>

<div class="gallery">

<img src="images/nature1.jpg"
class="gallery-item nature"
onclick="openImage(this)">

<img src="images/nature2.jpg"
class="gallery-item nature"
onclick="openImage(this)">

<img src="images/animal1.jpg"
class="gallery-item animal"
onclick="openImage(this)">

<img src="images/animal2.jpg"
class="gallery-item animal"
onclick="openImage(this)">

<img src="images/city1.jpg"
class="gallery-item city"
onclick="openImage(this)">

<img src="images/city2.jpg"
class="gallery-item city"
onclick="openImage(this)">

</div>

<div id="lightbox">

<span id="close">&times;</span>

<button id="prev">&#10094;</button>

<img id="lightbox-img">

<button id="next">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
